<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة مستخدم</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    {{if .Success}}
        <div class="success-box">
            <h1> تم إنشاء المستخدم بنجاح!</h1>
            <br><br>
            <a href="/users" class="btn-continue">مواصلة إلى الصفحة الرئيسية</a>
            <br><br>
            <a href="/users/create" style="color: blue;">إضافة مستخدم آخر</a>
        </div>
    {{else}}
        <div class="top-bar">
            <h1 style="margin: 0;">إنشاء مستخدم جديد</h1>
            <a href="/users" class="btn-back"> رجوع إلى الرئيسية</a>
        </div>
        
        {{if .Error}} 
            <div class="error-message"> ! {{.Error}}</div>
        {{end}}
        
        <div id="user-form-container">
            <div class="form-header">
                <h2>انشاء مستخدم جديد</h2>
            </div>

            <form action="/users/create" method="POST">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" name="Fullname" required placeholder="أدخل الاسم">
                </div>
                <div class="form-group">
                    <label>رقم الهاتف:</label>
                    <input type="text" name="Phonenumber" placeholder="05xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" name="Email" required placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>المسمى الوظيفي:</label>
                    <input type="text" name="Position">
                </div>
                <div class="form-group">
                    <label>العمر:</label>
                    <input type="number" name="Age" required placeholder="أدخل العمر" min="1" max="150">
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-submit"> إنشاء المستخدم</button>
                    <a href="/users" class="btn-back"> إلغاء</a>
                </div>
            </form>
        </div>
    {{end}}
</body>
</html>
