<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تعديل مستخدم</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    {{if .Success}}
        <div class="success-message">
            <h2> تم التحديث بنجاح!</h2>
            <p>تم حفظ التعديلات الجديدة للمستخدم <strong>{{ .user.Fullname }}</strong>.</p>
            <br>
            <a href="/users" class="btn-back btn-back-large" style="background: #28a745;">🏠 العودة إلى الرئيسية</a>
        </div>
    {{else}}
        <div class="top-bar">
            <h2 style="margin: 0;"> تعديل بيانات المستخدم</h2>
            <a href="/users" class="btn-back"> رجوع</a>
        </div>
        
        {{if .Error}} 
            <div class="error-message"> {{.Error}}</div>
        {{end}}
        
        <div id="user-form-container">
            <form action="/users/update/{{ .user.ID }}" method="POST">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" name="Fullname" value="{{ .user.Fullname }}">
                </div>

                <div class="form-group">
                    <label>رقم الهاتف:</label>
                    <input type="text" name="Phonenumber" value="{{ .user.Phonenumber }}">
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" name="Email" value="{{ .user.Email }}">
                </div>

                <div class="form-group">
                    <label>المسمى الوظيفي:</label>
                    <input type="text" name="Position" value="{{ .user.Position }}">
                </div>

                <div class="form-group">
                    <label>كلمة المرور الجديدة:</label>
                    <input type="password" name="Password" placeholder="اتركه فارغاً للحفاظ على القديمة">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit"> حفظ التعديلات</button>
                    <a href="/users" class="btn-back"> إلغاء</a>
                </div>
            </form>
        </div>
    {{end}}
</body>
</html>
